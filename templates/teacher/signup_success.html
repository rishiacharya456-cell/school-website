{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Registration Submitted</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:url("{% static 'images/welcome.png' %}") no-repeat center center/cover;
            font-family:'Poppins', sans-serif;
        }

        .overlay{
            position:absolute;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.7);
        }

        .card{
            position:relative;
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(15px);
            padding:40px;
            border-radius:15px;
            text-align:center;
            color:white;
            max-width:450px;
        }

        h2{
            margin-bottom:15px;
            color:#ffc107;
        }

        p{
            font-size:14px;
            margin-bottom:20px;
        }

        a{
            display:inline-block;
            padding:10px 20px;
            background:#ffc107;
            color:black;
            text-decoration:none;
            border-radius:8px;
            font-weight:600;
        }

        a:hover{
            background:#ffca2c;
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="card">
    <h2>Registration Submitted Successfully!</h2>
    <p>
        Your registration has been submitted successfully.<br>
        Please wait for admin approval.<br>
        You will receive login credentials via email after approval.
    </p>

    <a href="{% url 'teacher_login' %}">Go to Login</a>
</div>

</body>
</html>
