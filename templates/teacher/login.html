{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Login | Saraswoti English Boarding School</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            height:100vh;
            background: url("{% static 'images/welcome.png' %}") no-repeat center center/cover;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .overlay{
            position:absolute;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.55);
        }

        .login-container{
            position:relative;
            background:rgba(255,255,255,0.1);
            backdrop-filter:blur(15px);
            width:95%;
            max-width:420px;
            padding:35px 30px;
            border-radius:18px;
            box-shadow:0 20px 40px rgba(0,0,0,0.4);
            text-align:center;
            color:white;
        }

        .logo{
            width:80px;
            margin-bottom:10px;
        }

        .school-name{
            font-size:20px;
            font-weight:600;
        }

        .school-address{
            font-size:13px;
            margin-bottom:20px;
            opacity:0.85;
        }

        h2{
            margin-bottom:20px;
            font-weight:500;
        }

        .input-group{
            margin-bottom:18px;
            text-align:left;
        }

        .input-group label{
            font-size:13px;
        }

        .input-group input{
            width:100%;
            padding:10px;
            margin-top:5px;
            border-radius:8px;
            border:none;
            outline:none;
        }

        .login-btn{
            width:100%;
            padding:10px;
            border:none;
            border-radius:8px;
            background:#ffc107;
            color:black;
            font-weight:600;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn:hover{
            background:#ffca2c;
        }

        .links{
            margin-top:15px;
            font-size:13px;
        }

        .links a{
            color:#ffc107;
            text-decoration:none;
        }

        .error{
            background:rgba(255,0,0,0.2);
            padding:8px;
            border-radius:6px;
            margin-bottom:10px;
            font-size:13px;
        }

        .slogan{
            margin-top:18px;
            font-size:12px;
            font-style:italic;
            opacity:0.9;
        }

        @media(max-width:480px){
            .login-container{
                padding:25px 20px;
            }
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="login-container">

    <img src="{% static 'images/logo.png' %}" class="logo">

    <div class="school-name">
        Saraswoti English Boarding School
    </div>

    <div class="school-address">
        Triyuga-05, Deuri, Udayapur
    </div>

    <h2>Teacher Login</h2>

    {% if error %}
        <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}

        <div class="input-group">
            <label>Email or Username</label>
            <input type="text" name="username" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button type="submit" class="login-btn">Login</button>
    </form>

    <div class="links">
        <a href="#">Forgot Password?</a> |
        <a href="{% url 'teacher_signup' %}">Sign Up</a>
    </div>

    <div class="slogan">
        "Empowering Teachers, Inspiring Generations."
    </div>

</div>

</body>
</html>
