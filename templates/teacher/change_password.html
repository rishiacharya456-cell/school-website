{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Change Password | Saraswoti English Boarding School</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Poppins', sans-serif;
        }

        body{
            height:100vh;
            background:url("{% static 'images/welcome.png' %}") no-repeat center center/cover;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .overlay{
            position:absolute;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.7);
        }

        .card{
            position:relative;
            background:rgba(255,255,255,0.15);
            backdrop-filter:blur(15px);
            padding:40px;
            border-radius:18px;
            width:90%;
            max-width:420px;
            text-align:center;
            color:white;
            box-shadow:0 20px 40px rgba(0,0,0,0.5);
        }

        h2{
            margin-bottom:20px;
            color:#ffc107;
        }

        form p{
            text-align:left;
            margin-bottom:15px;
        }

        input{
            width:100%;
            padding:10px;
            margin-top:5px;
            border-radius:8px;
            border:none;
            outline:none;
        }

        button{
            width:100%;
            padding:12px;
            background:#ffc107;
            border:none;
            border-radius:8px;
            font-weight:600;
            cursor:pointer;
            margin-top:10px;
        }

        button:hover{
            background:#ffca2c;
        }

        .errorlist{
            color:#ff4d4d;
            font-size:13px;
            margin-bottom:10px;
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="card">
    <h2>Change Your Password</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit">
            Update Password
        </button>
    </form>
</div>

</body>
</html>
