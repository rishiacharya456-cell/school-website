{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Teacher Registration | Saraswoti English Boarding School</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

        body{
            min-height:100vh;
            background:url("{% static 'images/welcome.png' %}") no-repeat center center/cover;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .overlay{
            position:fixed;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.65);
            top:0;
            left:0;
        }

        .signup-container{
            position:relative;
            background:rgba(255,255,255,0.12);
            backdrop-filter:blur(18px);
            width:100%;
            max-width:900px;
            padding:40px;
            border-radius:20px;
            box-shadow:0 25px 50px rgba(0,0,0,0.5);
            color:white;
        }

        .logo{
            width:80px;
            display:block;
            margin:0 auto 10px;
        }

        .school-name{
            text-align:center;
            font-size:22px;
            font-weight:600;
        }

        .school-address{
            text-align:center;
            font-size:14px;
            margin-bottom:25px;
            opacity:0.85;
        }

        h2{text-align:center;margin-bottom:25px;}

        .form-row{
            display:flex;
            flex-wrap:wrap;
            gap:15px;
        }

        .form-group{
            flex:1 1 48%;
            margin-bottom:15px;
        }

        .full-width{flex:1 1 100%;}

        label{font-size:13px;}

        input, select, textarea{
            width:100%;
            padding:10px;
            margin-top:5px;
            border-radius:8px;
            border:none;
            outline:none;
        }

        textarea{resize:none;}

        .signup-btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            background:#ffc107;
            font-weight:600;
            margin-top:20px;
            cursor:pointer;
        }

        .signup-btn:hover{background:#ffca2c;}

        .links{text-align:center;margin-top:15px;font-size:13px;}
        .links a{color:#ffc107;text-decoration:none;}

        @media(max-width:768px){
            .form-group{flex:1 1 100%;}
        }
    </style>
</head>
<body>

<div class="overlay"></div>

<div class="signup-container">

    <img src="{% static 'images/logo.png' %}" class="logo">

    <div class="school-name">
        Saraswoti English Boarding School
    </div>

    <div class="school-address">
        Triyuga-05, Deuri, Udayapur
    </div>

    <h2>Teacher Registration Form</h2>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="form-row">

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" required>
            </div>

            <div class="form-group">
                <label>Email (Compulsory)</label>
                <input type="email" name="email" required>
            </div>

            <div class="form-group">
                <label>Date of Birth</label>
                <input type="date" name="dob" required>
            </div>

            <div class="form-group">
                <label>Contact Number</label>
                <input type="text" name="contact_no" required>
            </div>

            <div class="form-group">
                <label>Emergency Contact</label>
                <input type="text" name="emergency_contact" required>
            </div>

            <div class="form-group">
                <label>Relation</label>
                <input type="text" name="relation" required>
            </div>

            <div class="form-group">
                <label>Marital Status</label>
                <select name="married" required>
                    <option value="">Select</option>
                    <option>Yes</option>
                    <option>No</option>
                </select>
            </div>

            <div class="form-group">
                <label>Subject</label>
                <input type="text" name="subject" required>
            </div>

            <div class="form-group">
                <label>Experience (Years)</label>
                <input type="number" name="experience">
            </div>

            <!-- Qualification Section -->

            <div class="form-group">
                <label>Qualification Level</label>
                <select name="qualification_level" id="qualification_level" required>
                    <option value="">Select</option>
                    <option value="SEE">SEE</option>
                    <option value="Plus2">+2</option>
                    <option value="Bachelor">Bachelor</option>
                    <option value="Master">Master</option>
                </select>
            </div>

            <div class="form-group">
                <label>Status</label>
                <select name="qualification_status" id="qualification_status" required>
                    <option value="">Select</option>
                    <option value="Completed">Completed</option>
                    <option value="Running">Running</option>
                </select>
            </div>

            <div class="form-group full-width" id="qualification_upload_group">
                <label>Upload Qualification Certificate</label>
                <input type="file" name="qualification_docs" id="qualification_docs">
            </div>

            <!-- Document Section -->

            <div class="form-group">
                <label>Document Type</label>
                <select name="document_type" required>
                    <option value="">Select</option>
                    <option>Citizenship</option>
                    <option>Passport</option>
                    <option>Driving License</option>
                </select>
            </div>

            <div class="form-group">
                <label>Document Number</label>
                <input type="text" name="document_number" required>
            </div>

            <div class="form-group">
                <label>Issued Date (Compulsory)</label>
                <input type="date" name="issued_date" required>
            </div>

            <div class="form-group">
                <label>Expiry Date (Optional)</label>
                <input type="date" name="expiry_date">
            </div>

            <div class="form-group">
                <label>Issuing Authority</label>
                <input type="text" name="issuing_authority" required>
            </div>

            <div class="form-group">
                <label>Upload Profile Image</label>
                <input type="file" name="profile_image" accept="image/*" required>
            </div>

            <div class="form-group full-width">
                <label>Full Address</label>
                <textarea name="address" rows="3" required></textarea>
            </div>

        </div>

        <button type="submit" class="signup-btn">
            Submit Registration
        </button>
    </form>

    <div class="links">
        Already registered?
        <a href="{% url 'teacher_login' %}">Login Here</a>
    </div>

</div>

<script>
    const statusSelect = document.getElementById("qualification_status");
    const uploadGroup = document.getElementById("qualification_upload_group");
    const uploadInput = document.getElementById("qualification_docs");

    statusSelect.addEventListener("change", function(){
        if(this.value === "Completed"){
            uploadGroup.style.display = "block";
            uploadInput.required = true;
        }else{
            uploadGroup.style.display = "none";
            uploadInput.required = false;
        }
    });

    uploadGroup.style.display = "none";
</script>

</body>
</html>
