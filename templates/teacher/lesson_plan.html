{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>Create Lesson Plan | Saraswoti English Boarding School</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
        body{background:#f8fafc;padding:40px;}

        .container{
            max-width:900px;
            margin:auto;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 20px 60px rgba(0,0,0,0.05);
        }

        h1{
            text-align:center;
            margin-bottom:30px;
            font-size:24px;
            font-weight:700;
            color:#1e293b;
        }

        .form-row{
            display:flex;
            gap:20px;
            flex-wrap:wrap;
        }

        .form-group{
            flex:1 1 48%;
            margin-bottom:20px;
        }

        .form-group label{
            font-size:13px;
            font-weight:600;
            display:block;
            margin-bottom:6px;
            color:#334155;
        }

        .form-group input,
        .form-group select,
        .form-group textarea{
            width:100%;
            padding:10px;
            border-radius:8px;
            border:1px solid #cbd5e1;
            font-size:14px;
        }

        textarea{resize:none;}

        .full-width{flex:1 1 100%;}

        .submit-btn{
            width:100%;
            padding:12px;
            background:#6366f1;
            border:none;
            border-radius:10px;
            color:white;
            font-weight:600;
            cursor:pointer;
        }

        .submit-btn:hover{background:#4f46e5;}

        @media(max-width:768px){
            .form-group{flex:1 1 100%;}
        }

    </style>
</head>
<body>

<div class="container">

    <h1>Create Daily Lesson Plan</h1>

    <form method="POST">
        {% csrf_token %}

        <div class="form-row">

            <!-- LEVEL -->
            <div class="form-group">
                <label>Select Level</label>
                <select name="level" id="level" required onchange="updateClasses()">
                    <option value="">Select Level</option>
                    <option value="Montessori">Montessori</option>
                    <option value="Primary">Primary</option>
                    <option value="Secondary">Secondary</option>
                </select>
            </div>

            <!-- CLASS -->
            <div class="form-group">
                <label>Select Class</label>
                <select name="class_name" id="class_name" required>
                    <option value="">Select Class</option>
                </select>
            </div>

            <div class="form-group">
                <label>Section</label>
                <input type="text" name="section" required>
            </div>

            <div class="form-group">
                <label>Subject</label>
                <input type="text" name="subject" required>
            </div>

            <div class="form-group">
                <label>Date</label>
                <input type="date" name="date" required>
            </div>

            <div class="form-group">
                <label>Duration (Minutes)</label>
                <input type="number" name="duration" required>
            </div>

            <div class="form-group full-width">
                <label>Learning Objective</label>
                <textarea name="objective" rows="3" required></textarea>
            </div>

            <div class="form-group full-width">
                <label>Lesson Procedure</label>
                <textarea name="procedure" rows="4" required></textarea>
            </div>

            <div class="form-group full-width">
                <label>Homework</label>
                <textarea name="homework" rows="3"></textarea>
            </div>

        </div>

        <button type="submit" class="submit-btn">
            Submit Lesson Plan
        </button>

    </form>

</div>

<script>
function updateClasses(){
    const level = document.getElementById("level").value;
    const classSelect = document.getElementById("class_name");

    classSelect.innerHTML = '<option value="">Select Class</option>';

    let classes = [];

    if(level === "Montessori"){
        classes = ["PG","Nursery","LKG","UKG"];
    }
    else if(level === "Primary"){
        classes = ["1","2","3","4","5"];
    }
    else if(level === "Secondary"){
        classes = ["6","7","8","9","10"];
    }

    classes.forEach(function(cls){
        const option = document.createElement("option");
        option.value = cls;
        option.text = cls;
        classSelect.appendChild(option);
    });
}
</script>

</body>
</html>
